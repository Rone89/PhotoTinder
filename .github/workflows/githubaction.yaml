name: Build Unsigned IPA
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 消除那个烦人的 Node 警告

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild build \
            -project PhotoTinder.xcodeproj \
            -scheme PhotoTinder \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create Payload
        run: |
          mkdir -p Payload
          # 使用通配符查找 .app，防止路径名字对不上
          cp -r build/Release-iphoneos/*.app Payload/ 2>/dev/null || cp -r ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/*.app Payload/
          zip -r PhotoTinder_Unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Unsigned-IPA
          path: PhotoTinder_Unsigned.ipa
