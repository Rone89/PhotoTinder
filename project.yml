name: PhotoTinder
options:
  bundleIdPrefix: com.rone89
  generateDevelopmentInfoPlist: true
targets:
  PhotoTinder:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: PhotoTinder
    settings:
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "我们需要访问您的相册以帮助您筛选和清理照片"
      INFOPLIST_KEY_UISupportedInterfaceOrientations: ["UIInterfaceOrientationPortrait"]
