name: PhotoTinder
options:
  bundleIdPrefix: com.temp
targets:
  PhotoTinder:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources: [.]
    settings:
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGNING_ALLOWED: NO
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "我们需要相册权限来筛选照片"
