name: Build Unsigned IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild build \
            -project PhotoTinder.xcodeproj \
            -scheme PhotoTinder \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          # 将编译生成的 .app 文件移动到 Payload 文件夹
          cp -r build/Release-iphoneos/PhotoTinder.app Payload/
          # 压缩成 ipa
          zip -r PhotoTinder_Unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Unsigned-IPA
          path: PhotoTinder_Unsigned.ipa